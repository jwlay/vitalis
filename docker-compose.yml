services:
  vitalis:
    build: .
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://vitalis:vitalis@postgres:5432/vitalis
      - PORT=5000
    depends_on:
      - postgres
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=vitalis
      - POSTGRES_PASSWORD=vitalis
      - POSTGRES_DB=vitalis
    volumes:
      - vitalis-pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  vitalis-pgdata:
